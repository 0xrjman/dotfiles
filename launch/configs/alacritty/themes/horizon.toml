# Horizon Theme for Alacritty
# Ported from the provided VS Code JSON theme

[colors.primary]
background = "#1c1e26"
foreground = "#d5d8da"

[colors.cursor]
text = "#1c1e26"
cursor = "#e95378"

[colors.vi_mode_cursor]
text = "#1c1e26"
cursor = "#26bbd9"

[colors.selection]
text = "CellForeground"
background = "#6c6f93"

[colors.normal]
black = "#1c1e26"
red = "#e95678"
green = "#29d398"
yellow = "#fab795"
blue = "#26bbd9"
magenta = "#ee64ac"
cyan = "#59e1e3"
white = "#d5d8da"

[colors.bright]
black = "#6c6f93"
red = "#ec6a88"
green = "#3fdaa4"
yellow = "#fbc3a7"
blue = "#3fc4de"
magenta = "#f075b5"
cyan = "#6be4e6"
white = "#ffffff"

[colors.search.matches]
foreground = "#d5d8da"
background = "#6c6f93"

[colors.search.focused_match]
foreground = "#1c1e26"
background = "#e95378"

[colors.footer_bar]
background = "#232530"
foreground = "#d5d8da"

[colors.hints.start]
background = "#fab795"
foreground = "#1c1e26"

[colors.hints.end]
background = "#6c6f93"
foreground = "#d5d8da"
